name: Flutter Bootstrap
on:
  push:
    branches: [ main ]

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create Flutter project
        run: |
          if [ -d "glow-flutter" ]; then
            echo "Already bootstrapped"
            exit 0
          fi
          flutter create glow-flutter \
            --org com.glow.app \
            --project-name glow_flutter \
            --platforms android,ios

      - name: Commit to repo
        run: |
          if [ -d "glow-flutter" ] && [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add glow-flutter/
            git commit -m "chore: bootstrap Flutter project"
            git push
          fi
