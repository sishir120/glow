name: Mobile CI - Build APK

on:
  push:
    branches: [ main ]
    paths:
      - 'glow-mobile/**'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'glow-mobile/package-lock.json'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        working-directory: ./glow-mobile
        run: npm install

      - name: Prebuild Android Project
        working-directory: ./glow-mobile
        run: npx expo prebuild -p android --clean

      - name: Build APK (Release)
        working-directory: ./glow-mobile/android
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: glow-mobile-prototype-apk
          path: glow-mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
