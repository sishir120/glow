name: Flutter Android Build

on:
  push:
    branches: [ main ]
    paths:
      - 'glow-flutter/**'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: ./glow-flutter
        run: flutter pub get

      - name: Build APK (Release)
        working-directory: ./glow-flutter
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: glow-android-prototype
          path: glow-flutter/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 14

      - name: Post APK size summary
        working-directory: ./glow-flutter
        run: |
          APK_SIZE=$(du -sh build/app/outputs/flutter-apk/app-arm64-v8a-release.apk | cut -f1)
          echo "## ✅ Android APK Built" >> $GITHUB_STEP_SUMMARY
          echo "**APK Size:** $APK_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "**Architecture:** arm64-v8a (64-bit)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the APK artifact from the Actions tab to install on your Android device." >> $GITHUB_STEP_SUMMARY
